; ----------------------------------------------------------------------------
; ESP32-S3 build (original Waveshare ESP32-S3-Touch-AMOLED-2.16, has PSRAM)
; ----------------------------------------------------------------------------
[env:waveshare_amoled_216_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCLAWD_BOARD_S3=1
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; NimBLE config — peripheral, 2 simultaneous connections so the OS can
    ; hold the HID link (Space key from BOOT button) while the daemon holds
    ; its own connection for the custom data service.
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; ----------------------------------------------------------------------------
; ESP32-C6 build (Waveshare ESP32-C6-Touch-AMOLED-2.16, NO PSRAM, RISC-V)
; ----------------------------------------------------------------------------
; Notes:
;   * No PSRAM — only ~512KB internal SRAM. All MALLOC_CAP_SPIRAM allocations
;     have been routed to internal SRAM via CLAWD_NO_PSRAM. The 480×480 splash
;     canvas was replaced with an LVGL image at 24× zoom (20×20 buffer).
;   * Single-core RISC-V — strip-rotation in my_flush_cb runs slower than S3.
;   * Pin numbers in display_cfg.h are board-specific to the C6 variant and
;     MUST be filled in from the Waveshare ESP32-C6 demo before flashing.
;   * BLE on C6: same NimBLE-Arduino library; the Bluetooth controller is
;     different at IDF level but Arduino API is identical.
[env:waveshare_amoled_216_c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
; Default partition table reserves only 1.25MB for the app; we're at ~1.4MB.
; huge_app gives 3MB app slot (no OTA, fine for our use case) on this 8MB flash.
board_build.partitions = huge_app.csv
board_upload.flash_size = 8MB

build_flags =
    ; C6 has no USB-OTG, only a USB Serial/JTAG controller. USB_MODE=1 picks
    ; the HWCDC path so `Serial` resolves correctly; without this the
    ; S3-style `#define Serial USBSerial` in HardwareSerial.h fires and
    ; SensorLib fails to compile with "USBSerial was not declared".
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCLAWD_BOARD_C6=1
    -DCLAWD_NO_PSRAM=1
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; NimBLE config (same as S3)
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    ; Snapshot disabled on C6 — needs a 460KB framebuffer that doesn't fit.
    ; -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1
